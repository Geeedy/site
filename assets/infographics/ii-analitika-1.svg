<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" role="img" aria-label="Аналитика с ИИ в цифрах"><rect width="900" height="300" fill="#ffffff" rx="14"/><rect x="1" y="1" width="898" height="298" fill="none" stroke="#e1e0d9" rx="13"/><text x="36" y="52" font-size="24" font-weight="700" fill="#0b0b0b">Аналитика с ИИ в цифрах</text><rect x="36" y="88" width="264" height="150" fill="#f4f4f1" rx="12"/><rect x="36" y="88" width="264" height="6" fill="#008300" rx="3"/><text x="54" y="152" font-size="30" font-weight="800" fill="#0b0b0b">+10–30%</text><text x="54" y="182" font-size="13.5" fill="#52514e">точность прогнозов против</text><text x="54" y="201" font-size="13.5" fill="#52514e">традиционных методов (Korus)</text><rect x="318" y="88" width="264" height="150" fill="#f4f4f1" rx="12"/><rect x="318" y="88" width="264" height="6" fill="#2a78d6" rx="3"/><text x="336" y="152" font-size="30" font-weight="800" fill="#0b0b0b">+20–40%</text><text x="336" y="182" font-size="13.5" fill="#52514e">быстрее принимаются</text><text x="336" y="201" font-size="13.5" fill="#52514e">управленческие решения</text><rect x="600" y="88" width="264" height="150" fill="#f4f4f1" rx="12"/><rect x="600" y="88" width="264" height="6" fill="#c9750a" rx="3"/><text x="618" y="152" font-size="30" font-weight="800" fill="#0b0b0b">24/7</text><text x="618" y="182" font-size="13.5" fill="#52514e">отчёты по расписанию</text><text x="618" y="201" font-size="13.5" fill="#52514e">без ручных выгрузок</text></svg>