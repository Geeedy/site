<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 504" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" role="img" aria-label="Как проходит внедрение"><rect width="900" height="504" fill="#ffffff" rx="14"/><rect x="1" y="1" width="898" height="502" fill="none" stroke="#e1e0d9" rx="13"/><text x="36" y="52" font-size="24" font-weight="700" fill="#0b0b0b">Как проходит внедрение</text><line x1="66" y1="111" x2="66" y2="160" stroke="#e1e0d9" stroke-width="3"/><circle cx="66" cy="98" r="22" fill="#2a78d6"/><text x="66" y="104" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="110" y="96" font-size="17" font-weight="700" fill="#0b0b0b">Аудит процессов</text><text x="110" y="120" font-size="14" fill="#52514e">1–2 недели: считаем экономику каждого процесса</text><line x1="66" y1="185" x2="66" y2="234" stroke="#e1e0d9" stroke-width="3"/><circle cx="66" cy="172" r="22" fill="#2a78d6"/><text x="66" y="178" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="110" y="170" font-size="17" font-weight="700" fill="#0b0b0b">Выбор процесса с максимальным ROI</text><text x="110" y="194" font-size="14" fill="#52514e">фиксируем метрики «до»</text><line x1="66" y1="259" x2="66" y2="308" stroke="#e1e0d9" stroke-width="3"/><circle cx="66" cy="246" r="22" fill="#2a78d6"/><text x="66" y="252" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="110" y="244" font-size="17" font-weight="700" fill="#0b0b0b">Пилот</text><text x="110" y="268" font-size="14" fill="#52514e">ИИ на ограниченном объёме под контролем ваших сотрудников</text><line x1="66" y1="333" x2="66" y2="382" stroke="#e1e0d9" stroke-width="3"/><circle cx="66" cy="320" r="22" fill="#2a78d6"/><text x="66" y="326" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="110" y="318" font-size="17" font-weight="700" fill="#0b0b0b">Замер метрик «после»</text><text x="110" y="342" font-size="14" fill="#52514e">часы, стоимость операции, ошибки</text><circle cx="66" cy="394" r="22" fill="#2a78d6"/><text x="66" y="400" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">5</text><text x="110" y="392" font-size="17" font-weight="700" fill="#0b0b0b">Масштабирование</text><text x="110" y="416" font-size="14" fill="#52514e">оплата этапами: платите за подтверждённый результат</text></svg>