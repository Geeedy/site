<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" role="img" aria-label="Вендорский ИИ или модель под процесс"><rect width="900" height="390" fill="#ffffff" rx="14"/><rect x="1" y="1" width="898" height="388" fill="none" stroke="#e1e0d9" rx="13"/><text x="36" y="52" font-size="24" font-weight="700" fill="#0b0b0b">Вендорский ИИ или модель под процесс</text><rect x="246" y="62" width="295" height="40" fill="#52514e" rx="8"/><text x="393.5" y="88" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1С:Напарник</text><rect x="555" y="62" width="295" height="40" fill="#2a78d6" rx="8"/><text x="702.5" y="88" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Модель под процесс</text><rect x="30" y="90" width="840" height="52" fill="#f4f4f1" rx="8"/><text x="42" y="120" font-size="14.5" font-weight="700" fill="#0b0b0b">Что делает</text><text x="254" y="111" font-size="14" fill="#52514e">Типовые подсказки</text><text x="254" y="129" font-size="14" fill="#52514e">в интерфейсе</text><text x="563" y="120" font-size="14" fill="#52514e">Ваш процесс целиком</text><text x="42" y="176" font-size="14.5" font-weight="700" fill="#0b0b0b">Настройка</text><text x="254" y="176" font-size="14" fill="#52514e">Ограниченная</text><text x="563" y="176" font-size="14" fill="#52514e">По вашим регламентам</text><rect x="30" y="202" width="840" height="52" fill="#f4f4f1" rx="8"/><text x="42" y="232" font-size="14.5" font-weight="700" fill="#0b0b0b">Контур данных</text><text x="254" y="232" font-size="14" fill="#52514e">Определяет вендор</text><text x="563" y="232" font-size="14" fill="#52514e">Ваш контур</text><text x="42" y="288" font-size="14.5" font-weight="700" fill="#0b0b0b">Когда выбирать</text><text x="254" y="288" font-size="14" fill="#52514e">Типовые задачи</text><text x="563" y="279" font-size="14" fill="#52514e">Поток документов,</text><text x="563" y="297" font-size="14" fill="#52514e">специфика, ИБ</text><text x="36" y="368" font-size="13" fill="#52514e">Подходы совместимы: база от вендора + внешняя модель там, где нужна ваша логика</text></svg>