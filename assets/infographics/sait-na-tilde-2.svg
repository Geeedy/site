<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" role="img" aria-label="Четыре сигнала, что вы переросли Тильду"><rect width="900" height="430" fill="#ffffff" rx="14"/><rect x="1" y="1" width="898" height="428" fill="none" stroke="#e1e0d9" rx="13"/><text x="36" y="52" font-size="24" font-weight="700" fill="#0b0b0b">Четыре сигнала, что вы переросли Тильду</text><line x1="66" y1="111" x2="66" y2="160" stroke="#e1e0d9" stroke-width="3"/><circle cx="66" cy="98" r="22" fill="#2a78d6"/><text x="66" y="104" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="110" y="96" font-size="17" font-weight="700" fill="#0b0b0b">Каталог не влезает</text><text x="110" y="120" font-size="14" fill="#52514e">сотни товаров, фильтры тормозят</text><line x1="66" y1="185" x2="66" y2="234" stroke="#e1e0d9" stroke-width="3"/><circle cx="66" cy="172" r="22" fill="#2a78d6"/><text x="66" y="178" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="110" y="170" font-size="17" font-weight="700" fill="#0b0b0b">Нужна интеграция с 1С</text><text x="110" y="194" font-size="14" fill="#52514e">остатки и цены руками уже не синхронизировать</text><line x1="66" y1="259" x2="66" y2="308" stroke="#e1e0d9" stroke-width="3"/><circle cx="66" cy="246" r="22" fill="#2a78d6"/><text x="66" y="252" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="110" y="244" font-size="17" font-weight="700" fill="#0b0b0b">SEO упёрлось в платформу</text><text x="110" y="268" font-size="14" fill="#52514e">скорость и структура не в вашей власти</text><circle cx="66" cy="320" r="22" fill="#2a78d6"/><text x="66" y="326" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="110" y="318" font-size="17" font-weight="700" fill="#0b0b0b">Нужны ИИ-функции</text><text x="110" y="342" font-size="14" fill="#52514e">бот, умный поиск, персонализация</text></svg>