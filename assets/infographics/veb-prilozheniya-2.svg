<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" role="img" aria-label="Монолит или микросервисы"><rect width="900" height="390" fill="#ffffff" rx="14"/><rect x="1" y="1" width="898" height="388" fill="none" stroke="#e1e0d9" rx="13"/><text x="36" y="52" font-size="24" font-weight="700" fill="#0b0b0b">Монолит или микросервисы</text><rect x="246" y="62" width="295" height="40" fill="#52514e" rx="8"/><text x="393.5" y="88" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Монолит</text><rect x="555" y="62" width="295" height="40" fill="#2a78d6" rx="8"/><text x="702.5" y="88" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Микросервисы</text><rect x="30" y="90" width="840" height="52" fill="#f4f4f1" rx="8"/><text x="42" y="120" font-size="14.5" font-weight="700" fill="#0b0b0b">Старт</text><text x="254" y="120" font-size="14" fill="#52514e">Быстрее и дешевле</text><text x="563" y="120" font-size="14" fill="#52514e">Дороже на входе</text><text x="42" y="176" font-size="14.5" font-weight="700" fill="#0b0b0b">Команда</text><text x="254" y="176" font-size="14" fill="#52514e">1 команда</text><text x="563" y="176" font-size="14" fill="#52514e">Независимые команды</text><rect x="30" y="202" width="840" height="52" fill="#f4f4f1" rx="8"/><text x="42" y="232" font-size="14.5" font-weight="700" fill="#0b0b0b">Масштабирование</text><text x="254" y="232" font-size="14" fill="#52514e">Целиком</text><text x="563" y="232" font-size="14" fill="#52514e">По сервисам</text><text x="42" y="288" font-size="14.5" font-weight="700" fill="#0b0b0b">Когда выбирать</text><text x="254" y="288" font-size="14" fill="#52514e">MVP, один продукт</text><text x="563" y="279" font-size="14" fill="#52514e">Экосистема, высокая</text><text x="563" y="297" font-size="14" fill="#52514e">нагрузка, AI-модули</text><text x="36" y="368" font-size="13" fill="#52514e">Честный выбор: микросервисы — там, где оправданы, а не по моде</text></svg>