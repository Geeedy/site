<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" role="img" aria-label="Как работает голосовой бот"><rect width="900" height="280" fill="#ffffff" rx="14"/><rect x="1" y="1" width="898" height="278" fill="none" stroke="#e1e0d9" rx="13"/><text x="36" y="52" font-size="24" font-weight="700" fill="#0b0b0b">Как работает голосовой бот</text><rect x="36" y="96" width="172" height="118" fill="#f4f4f1" rx="12"/><rect x="36" y="96" width="172" height="6" fill="#52514e" rx="3"/><text x="122.0" y="142" font-size="15.5" font-weight="700" fill="#0b0b0b" text-anchor="middle">Звонок</text><text x="122.0" y="184" font-size="12.5" fill="#52514e" text-anchor="middle">входящий или</text><text x="122.0" y="201" font-size="12.5" fill="#52514e" text-anchor="middle">обзвон базы</text><path d="M 216 155.0 l 26 0 m -8 -8 l 8 8 l -8 8" stroke="#2a78d6" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="254" y="96" width="172" height="118" fill="#f4f4f1" rx="12"/><rect x="254" y="96" width="172" height="6" fill="#2a78d6" rx="3"/><text x="340.0" y="142" font-size="15.5" font-weight="700" fill="#0b0b0b" text-anchor="middle">Бот говорит</text><text x="340.0" y="184" font-size="12.5" fill="#52514e" text-anchor="middle">распознаёт речь,</text><text x="340.0" y="201" font-size="12.5" fill="#52514e" text-anchor="middle">отвечает по базе</text><path d="M 434 155.0 l 26 0 m -8 -8 l 8 8 l -8 8" stroke="#2a78d6" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="472" y="96" width="172" height="118" fill="#f4f4f1" rx="12"/><rect x="472" y="96" width="172" height="6" fill="#2a78d6" rx="3"/><text x="558.0" y="142" font-size="15.5" font-weight="700" fill="#0b0b0b" text-anchor="middle">Действие</text><text x="558.0" y="184" font-size="12.5" fill="#52514e" text-anchor="middle">запись, подтверждение,</text><text x="558.0" y="201" font-size="12.5" fill="#52514e" text-anchor="middle">квалификация</text><path d="M 652 155.0 l 26 0 m -8 -8 l 8 8 l -8 8" stroke="#2a78d6" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="690" y="96" width="172" height="118" fill="#f4f4f1" rx="12"/><rect x="690" y="96" width="172" height="6" fill="#008300" rx="3"/><text x="776.0" y="142" font-size="15.5" font-weight="700" fill="#0b0b0b" text-anchor="middle">Результат в CRM</text><text x="776.0" y="184" font-size="12.5" fill="#52514e" text-anchor="middle">или перевод</text><text x="776.0" y="201" font-size="12.5" fill="#52514e" text-anchor="middle">на оператора</text></svg>