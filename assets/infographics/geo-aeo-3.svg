<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" role="img" aria-label="Почему GEO нельзя откладывать"><rect width="900" height="300" fill="#ffffff" rx="14"/><rect x="1" y="1" width="898" height="298" fill="none" stroke="#e1e0d9" rx="13"/><text x="36" y="52" font-size="24" font-weight="700" fill="#0b0b0b">Почему GEO нельзя откладывать</text><rect x="36" y="88" width="264" height="150" fill="#f4f4f1" rx="12"/><rect x="36" y="88" width="264" height="6" fill="#2a78d6" rx="3"/><text x="54" y="152" font-size="30" font-weight="800" fill="#0b0b0b">13 млн</text><text x="54" y="182" font-size="13.5" fill="#52514e">человек в день читают</text><text x="54" y="201" font-size="13.5" fill="#52514e">ИИ-ответы Яндекса</text><rect x="318" y="88" width="264" height="150" fill="#f4f4f1" rx="12"/><rect x="318" y="88" width="264" height="6" fill="#c03535" rx="3"/><text x="336" y="152" font-size="30" font-weight="800" fill="#0b0b0b">−25%</text><text x="336" y="182" font-size="13.5" fill="#52514e">мировой поисковый трафик</text><text x="336" y="201" font-size="13.5" fill="#52514e">за год (DCN)</text><rect x="600" y="88" width="264" height="150" fill="#f4f4f1" rx="12"/><rect x="600" y="88" width="264" height="6" fill="#008300" rx="3"/><text x="618" y="152" font-size="30" font-weight="800" fill="#0b0b0b">1–5%</text><text x="618" y="182" font-size="13.5" fill="#52514e">коммерциализация AI-выдачи:</text><text x="618" y="201" font-size="13.5" fill="#52514e">окно для контента (наш замер)</text></svg>