акты, доверие</text><line x1="66" y1="407" x2="66" y2="456" stroke="#e1e0d9" stroke-width="3"/><circle cx="66" cy="394" r="22" fill="#2a78d6"/><text x="66" y="400" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">5</text><text x="110" y="392" font-size="17" font-weight="700" fill="#0b0b0b">Ссылочный профиль</text><text x="110" y="416" font-size="14" fill="#52514e">качество и токсичность доноров</text><circle cx="66" cy="468" r="22" fill="#2a78d6"/><text x="66" y="474" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">6</text><text x="110" y="466" font-size="17" font-weight="700" fill="#0b0b0b">GEO-готовность</text><text x="110" y="490" font-size="14" fill="#52514e">цитируемость в ИИ-ответах: schema, llms.txt</text></svg>