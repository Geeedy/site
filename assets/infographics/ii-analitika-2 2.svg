<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" role="img" aria-label="Вопрос → ответ на ваших данных"><rect width="900" height="280" fill="#ffffff" rx="14"/><rect x="1" y="1" width="898" height="278" fill="none" stroke="#e1e0d9" rx="13"/><text x="36" y="52" font-size="24" font-weight="700" fill="#0b0b0b">Вопрос → ответ на ваших данных</text><rect x="36" y="96" width="172" height="118" fill="#f4f4f1" rx="12"/><rect x="36" y="96" width="172" height="6" fill="#52514e" rx="3"/><text x="122.0" y="142" font-size="15.5" font-weight="700" fill="#0b0b0b" text-anchor="middle">Вопрос словами</text><text x="122.0" y="184" font-size="12.5" fill="#52514e" text-anchor="middle">«сколько лидов дал</text><text x="122.0" y="201" font-size="12.5" fill="#52514e" text-anchor="middle">сайт в июне?»</text><path d="M 216 155.0 l 26 0 m -8 -8 l 8 8 l -8 8" stroke="#2a78d6" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="254" y="96" width="172" height="118" fill="#f4f4f1" rx="12"/><rect x="254" y="96" width="172" height="6" fill="#2a78d6" rx="3"/><text x="340.0" y="142" font-size="15.5" font-weight="700" fill="#0b0b0b" text-anchor="middle">ИИ-агент</text><text x="340.0" y="184" font-size="12.5" fill="#52514e" text-anchor="middle">понимает вопрос,</text><text x="340.0" y="201" font-size="12.5" fill="#52514e" text-anchor="middle">строит запрос</text><path d="M 434 155.0 l 26 0 m -8 -8 l 8 8 l -8 8" stroke="#2a78d6" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="472" y="96" width="172" height="118" fill="#f4f4f1" rx="12"/><rect x="472" y="96" width="172" height="6" fill="#2a78d6" rx="3"/><text x="558.0" y="142" font-size="15.5" font-weight="700" fill="#0b0b0b" text-anchor="middle">Ваши системы</text><text x="558.0" y="184" font-size="12.5" fill="#52514e" text-anchor="middle">CRM, 1С, Метрика,</text><text x="558.0" y="201" font-size="12.5" fill="#52514e" text-anchor="middle">таблицы</text><path d="M 652 155.0 l 26 0 m -8 -8 l 8 8 l -8 8" stroke="#2a78d6" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="690" y="96" width="172" height="118" fill="#f4f4f1" rx="12"/><rect x="690" y="96" width="172" height="6" fill="#008300" rx="3"/><text x="776.0" y="142" font-size="15.5" font-weight="700" fill="#0b0b0b" text-anchor="middle">Ответ с цифрами</text><text x="776.0" y="184" font-size="12.5" fill="#52514e" text-anchor="middle">текст + таблица</text><text x="776.0" y="201" font-size="12.5" fill="#52514e" text-anchor="middle">+ график</text></svg>