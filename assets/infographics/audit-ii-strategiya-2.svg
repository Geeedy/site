<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif" role="img" aria-label="Классический консалтинг или наш аудит"><rect width="900" height="390" fill="#ffffff" rx="14"/><rect x="1" y="1" width="898" height="388" fill="none" stroke="#e1e0d9" rx="13"/><text x="36" y="52" font-size="24" font-weight="700" fill="#0b0b0b">Классический консалтинг или наш аудит</text><rect x="246" y="62" width="295" height="40" fill="#52514e" rx="8"/><text x="393.5" y="88" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Консалтинг</text><rect x="555" y="62" width="295" height="40" fill="#2a78d6" rx="8"/><text x="702.5" y="88" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">Наш аудит</text><rect x="30" y="90" width="840" height="52" fill="#f4f4f1" rx="8"/><text x="42" y="120" font-size="14.5" font-weight="700" fill="#0b0b0b">Результат</text><text x="254" y="120" font-size="14" fill="#52514e">Описание процессов</text><text x="563" y="120" font-size="14" fill="#52514e">Экономика в деньгах</text><text x="42" y="176" font-size="14.5" font-weight="700" fill="#0b0b0b">Рекомендации</text><text x="254" y="176" font-size="14" fill="#52514e">«Оптимизировать»</text><text x="563" y="167" font-size="14" fill="#52514e">Что отдать ИИ</text><text x="563" y="185" font-size="14" fill="#52514e">и в каком порядке</text><rect x="30" y="202" width="840" height="52" fill="#f4f4f1" rx="8"/><text x="42" y="232" font-size="14.5" font-weight="700" fill="#0b0b0b">Окупаемость</text><text x="254" y="232" font-size="14" fill="#52514e">Считается редко</text><text x="563" y="232" font-size="14" fill="#52514e">По каждому процессу</text><text x="42" y="288" font-size="14.5" font-weight="700" fill="#0b0b0b">Что дальше</text><text x="254" y="288" font-size="14" fill="#52514e">Ищете исполнителя</text><text x="563" y="288" font-size="14" fill="#52514e">Мы же и внедряем</text><text x="36" y="368" font-size="13" fill="#52514e">Мы отвечаем за реализуемость собственных рекомендаций</text></svg>